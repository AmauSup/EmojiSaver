<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EmoteVault</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>EmoteVault</h1>
  <div id="login-section">
    <form id="login-form" class="row">
      <input type="text" id="username-input" placeholder="Pseudo..." class="grow">
      <button type="submit" class="btn">Connexion</button>
    </form>
    <div id="login-error" class="error-text"></div>
  </div>
  <div id="main-section" class="hidden">
    <div class="row">
      <input type="text" id="search" placeholder="Rechercher..." class="grow">
       <select id="sort-filter" class="sort-select">
         <option value="recent">Récent</option>
         <option value="name-asc">Nom A → Z</option>
         <option value="name-desc">Nom Z → A</option>
       </select>
      <label class="fav-label">
        <input type="checkbox" id="fav-filter"> ⭐
      </label>
    </div>
    <div id="discord-link-section" class="discord-builder">
      <div class="discord-builder-row">
        <input type="text" id="discord-id-input" placeholder="ID de l'emoji Discord..." class="discord-builder-id">
        <input type="text" id="discord-name-input" placeholder="Nom à enregistrer" class="discord-builder-name">
         <button id="discord-link-btn" class="btn">Générer lien</button>
      </div>
      <div class="discord-builder-preview-row">
        <img id="discord-preview-image" alt="Prévisualisation emoji" class="hidden" width="40" height="40">
        <input type="text" id="discord-link-input" readonly placeholder="Le lien CDN généré apparaîtra ici..." class="discord-builder-link">
      </div>
      <div class="discord-builder-actions">
        <span id="discord-format-result"></span>
        <button id="discord-copy-btn" class="btn hidden">Copier URL</button>
        <button id="discord-save-btn" class="btn hidden">Enregistrer</button>
      </div>
    </div>
    <div class="auto-save-section">
      <button id="auto-save-server-btn" class="btn">Sauvegarder auto (serveur Discord)</button>
      <span id="auto-save-status"></span>
    </div>
    <div id="asset-list"></div>
    <button id="logout-btn" class="btn danger top-space">Déconnexion</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
